<main>
<h1>DataKollekt AB — Data platforms and AI agents that run in production</h1>
<p>DataKollekt AB is the Stockholm engineering consultancy of <strong>Pooya Shahryari</strong> — 7+ years building data platforms for Swedish enterprises, now building AI-agent systems that stay in production. <em>Omvandlar data till resultat.</em></p>

<h2>Services</h2>
<h3>Data engineering</h3>
<p>ETL/ELT pipelines, data warehousing (Data Vault 2.0, dimensional), and migrations off legacy stacks. Tools: SQL, Python, Pentaho, SSIS, Azure Data Factory, Snowflake, PostgreSQL, Oracle, Elasticsearch, Power BI / Qlik, Apache Airflow, Apache Spark, Databricks.</p>
<h3>AI-agent &amp; LLM systems</h3>
<p>Production agents on the Claude Agent SDK and MCP: autonomous services, custom MCP servers, LLM pipelines with test suites, CI gates, sandboxing and secrets management — engineering discipline applied to AI.</p>
<h3>Automation &amp; platform operations</h3>
<p>Self-healing services, infrastructure-as-code, monitoring, disaster-recovery runbooks, privilege-separated security models, and Linux. Systems that keep running when nobody is watching.</p>

<h2>Selected work (internal R&amp;D)</h2>
<ul>
<li><strong>Quant</strong> — advisory-only AI trading cockpit; FastAPI + SSE backend, React 19 frontend; the AI has zero execution authority; 150+ test files with CI-enforced architecture.</li>
<li><strong>Agent platform infrastructure</strong> — infrastructure-as-code for a multi-agent stack running 24/7 on self-hosted hardware, with privilege separation, keychain-only secrets, and a commit-gate pipeline.</li>
<li><strong>Content engine</strong> — a fleet of hand-built MCP servers and inference/media services; 400+ test files.</li>
<li><strong>Stealth SaaS</strong> — a multi-tenant AI teammate for software teams (in development).</li>
<li>Open source: <a href="https://github.com/pooya-sh/voice-inbox-bot">voice-inbox-bot</a>; spotify-genre-sync.</li>
</ul>

<h2>Founder — Pooya Shahryari</h2>
<p>Data engineer turned AI-agent engineer. 7+ years building data platforms for Swedish enterprises; since 2024 investing in a production multi-agent AI platform running 24/7 on self-hosted infrastructure. DataKollekt is deliberately a one-person consultancy — you work directly with the engineer who built everything.</p>
<h3>Experience</h3>
<ul>
<li>DataKollekt AB — Founder &amp; consultant (2021–present), Stockholm</li>
<li>Dun &amp; Bradstreet (Bisnode) — ETL developer: consolidating ~400 ETL jobs from a dozen legacy technologies into Pentaho (Java, Perl, Bash, PostgreSQL, Oracle, Elasticsearch)</li>
<li>XLENT — Data engineer (2019–2021): Data Vault 2.0 warehouse on Azure for Svenska kyrkan; SQL Server DW at Wasa Kredit</li>
<li>Avaus — Data engineer (2019): customer analytics for Axfood (Python, Snowflake, Teradata)</li>
<li>Academic Work — Java developer (2018–2019)</li>
<li>DIW — Founder (2014–2019): e-commerce</li>
<li>Huddinge kommun — Team lead / acting unit chief (2012–2018)</li>
</ul>
<p>Certifications: Certified SAFe 6 Agilist; Professional Scrum Master (scrum.org). Working languages: Swedish, English, Persian.</p>

<h2>Contact</h2>
<p>Email: <a href="mailto:pooya@datakollekt.se">pooya@datakollekt.se</a> · <a href="https://www.linkedin.com/in/pooya-sh/">LinkedIn</a> · <a href="https://github.com/pooya-sh">GitHub</a> · DataKollekt AB, Stockholm, Sweden.</p>
</main>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);

  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {

        e.target.tagName, String(e.target.src || e.target.href || ''));

    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

adding-bottom:52px !important}\n    #services{padding:52px 20px 32px !important}\n    #work{padding:44px 20px 32px !important}\n    #contact{padding:60px 20px 56px !important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"dk-root\" ref=\"{{ rootRef }}\" data-theme=\"{{ theme }}\" style=\"min-height:100vh\">\n\n<!-- ================= NAV ================= -->\n<header style=\"position:sticky;top:0;z-index:50;background:color-mix(in srgb, var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)\">\n  <nav data-pad=\"\" style=\"position:relative;max-width:1180px;margin:0 auto;padding:15px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px\">\n    <a href=\"#top\" style=\"display:flex;align-items:center;gap:11px;color:var(--fg)\">\n      <span style=\"width:14px;height:14px;background:var(--accent);border-radius:3px;transform:rotate(45deg);display:inline-block\"><\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.01em\">DataKollekt <span style=\"color:var(--muted2);font-weight:500;font-size:12px;font-family:'JetBrains Mono',monospace\">AB<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <button data-navtoggle=\"\" sc-camel-on-click=\"{{ toggleMenu }}\" aria-label=\"Toggle navigation menu\" style=\"cursor:pointer;align-items:center;justify-content:center;width:40px;height:38px;background:transparent;border:1px solid var(--border2);color:var(--fg);border-radius:9px;font-size:17px;line-height:1\">{{ menuIcon }}<\u002Fbutton>\n    <div data-navlinks=\"\" data-open=\"{{ menuOpenStr }}\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"display:flex;align-items:center;gap:24px\">\n      <a href=\"#work\" style=\"color:var(--muted);font-size:14px\">Work<\u002Fa>\n      <a href=\"#services\" style=\"color:var(--muted);font-size:14px\">Services<\u002Fa>\n      <a href=\"#founder\" style=\"color:var(--muted);font-size:14px\">Founder<\u002Fa>\n      <a href=\ sultancy of <span style=\"color:var(--fg);font-weight:500\">Pooya Shahryari<\u002Fspan> — 7+ years building data platforms for Swedish enterprises, now building AI-agent systems that stay in production.<\u002Fp>\n    <p data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--faint);margin:0 0 36px\">Omvandlar data till resultat.<\u002Fp>\n    <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:40px\">\n      <a href=\"#contact\" style=\"background:var(--accent);color:var(--accent-ink);padding:14px 24px;border-radius:9px;font-weight:600;font-size:14px\">Get in touch<\u002Fa>\n      <a href=\"#work\" style=\"border:1px solid var(--border2);color:var(--fg);padding:14px 22px;border-radius:9px;font-weight:500;font-size:14px\">See the work <span style=\"color:var(--accent)\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"display:inline-flex;align-items:center;gap:11px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--muted);border:1px solid var(--border);background:var(--panel);padding:9px 15px;border-radius:99px\">\n      <span ref=\"{{ pulseRef }}\" style=\"width:8px;height:8px;border-radius:50%;background:var(--accent);color:var(--accent);display:inline-block\"><\u002Fspan>\n      15+ services running on self-hosted infrastructure\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= PROOF BAR ================= -->\n<section style=\"background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:16px 32px;display:flex;flex-wrap:wrap;align-items:center;gap:9px 20px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted2)\">\n    <span>7+ yrs data engineering<\u002Fspan><span style=\"color:var(--accent);opacity:.55\">·<\u002Fspan>\n    <span>~400 ETL jobs migrated at Dun &amp; Bradstreet<\u002Fspan><span style=\"color:var(--accent);opacity:.55\">·<\u002Fspan>\n    <span>24/7 self-hosted agent platform<\u002Fspan><span style=\"color:var(--accent);opacity:.55\">·<\u002Fspan>\n    <span>700+ automated test files across projects<\u002Fspan><span style=\"color:var(--accent);opacity:.55\">·<\u002Fspan>\n    <span>Certified SAFe 6 Agilist<\u002Fspan><span style=\"color:var(--accent);opacity:.55\">·<\u002Fspan>\n    <span>Scrum Master (scrum.org)<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= SERVICES ================= -->\n<section id=\"services\" style=\"max-width:1180px;margin:0 auto;padding:80px 32px 40px\">\n  <div data-reveal=\"\" style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:40px\">\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted2);letter-spacing:.14em;margin-bottom:10px\">01 / SERVICES<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,3.4vw,36px);font-weight:600;letter-spacing:-.02em;margin:0\">What DataKollekt does<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"font-size:14px;color:var(--faint);max-width:280px\">Three pillars — one engineer across all of them.<\u002Fdiv>\n  <\u002Fdiv>\n  <div data-grid=\"3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px\">\n\n    <div data-reveal=\"\" style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:16px\">01<\u002Fdiv>\n      <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin:0 0 10px;letter-spacing:-.01em\">Data engineering<\u002Fh3>\n      <p style=\"font-size:14px;line-height:1.6;color:var(--muted);margin:0 0 20px\">ETL/ELT pipelines, data warehousing (Data Vault 2.0, dimensional), and migrations off legacy stacks.<\u002Fp>\n      <div ostgres + pgvector; every external vendor behind a provider-agnostic interface<\u002Fli>\n          <li style=\"display:flex;gap:10px;font-size:13.5px;line-height:1.5;color:var(--muted)\"><span style=\"color:var(--accent);font-family:'JetBrains Mono',monospace\">›<\u002Fspan>Real-time voice pipeline (STT/TTS); per-tenant envelope encryption from day one<\u002Fli>\n        <\u002Ful>\n        <div style=\"padding:8px 26px 26px;display:flex;flex-wrap:wrap;gap:6px;margin-top:auto\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">TypeScript<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Postgres + pgvector<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">STT / TTS<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Envelope encryption<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n\n    <!-- ---- Open source ---- -->\n    <div data-reveal=\"\" style=\"margin-top:6px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.1em;margin-bottom:14px\">OPEN SOURCE &amp; PERSONAL TOOLING<\u002Fdiv>\n      <div data-grid=\"2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px\">\n        <article style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 26px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px\">\n            <h4 style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;margin:0;color:var(--fg)\">voice-inbox-bot<\u002Fh4>\n            <a href=\"https://github.com/pooya-sh/voice-inbox-bot\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:4px 9px\">github ↗<\u002Fa>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.6;color:var(--muted);margin:0\">Telegram voice/text capture → speech-to-text → an AI-maintained markdown knowledge vault (Karpathy's LLM-wiki pattern), with an AI coach that replies by voice in Swedish or English. Nightly automated ingest, biweekly self-audits, a disaster-recovery runbook. Deployed 24/7 on self-hosted infrastructure.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 26px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px\">\n            <h4 style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;margin:0;color:var(--fg)\">spotify-genre-sync<\u002Fh4>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--faint);border:1px solid var(--border2);border-radius:6px;padding:4px 9px\">CLI<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.6;color:var(--muted);margin:0\">A clean Python CLI that auto-sorts Spotify Liked Songs into genre playlists. Dry-run mode, idempotent syncs, secrets in the OS keychain.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- closing quiet line -->\n    <p data-reveal=\"\" style=\"text-align:center;font-size:15px;color:var(--muted2);font-style:italic;margin:24px 0 8px;font-family:'Space Grotesk',sans-serif\">Private code, running systems — happy to walk through any of them live in a call.<\u002Fp>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FOUNDER ================= -->\n<section id=\"founder\" style=\"background:var(--bg2);border-top:1px solid var(--border);margin-top:40px\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:80px 32px\">\n    <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted2);letter-spacing:.14em;margin-bottom:10px\">03 / FOUNDER<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,3.4vw,36px);font-weight:600;letter-spacing:-.02em;margin:0 0 40px\">Who you'll work with<\u002Fh2>\n\n    <div data-founder-main=\"\" style=\"display:grid;grid-template-columns:300px 1fr;gap:48px;align-items:start\">\n      <div data-reveal=\"\">\n        <div style=\"border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--panel)\">\n          <img src=\"92e98b50-1b0b-4755-81e6-0287944f66b0\" alt=\"Portrait of Pooya Shahryari, founder of DataKollekt AB\" style=\"display:block;width:100%;height:auto;filter:grayscale(1) contrast(1.02)\">\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin-top:16px\">Pooya Shahryari<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2);margin-top:4px\">Founder &amp; consultant<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--faint);margin-top:10px\">Working languages: Swedish · English · Persian<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:16px\">\n          <a href=\"https://www.linkedin.com/in/pooya-sh\" target=\"_blank\" rel=\"noopener\" style=\"flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border2);border-radius:8px;padding:8px\">LinkedIn ↗<\u002Fa>\n          <a href=\"https://github.com/pooya-sh\" target=\"_blank\" rel=\"noopener\" style=\"flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border2);border-radius:8px;padding:8px\">GitHub ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\">\n        <p style=\"font-size:16.5px;line-height:1.7;color:var(--fg);margin:0 0 16px\">I'm a data engineer turned AI-agent engineer. I've spent 7+ years building data platforms for Swedish enterprises, and since 2024 I've been investing in my own R&amp;D — a production multi-agent AI platform that runs 24/7 on self-hosted infrastructure.<\u002Fp>\n        <p style=\"font-size:15px;line-height:1.7;color:var(--muted);margin:0 0 16px\">I'm a relentless learner who builds leverage instead of trading hours for money. I automate everything twice, and I run my own AI-maintained \"second brain\" so nothing gets lost. Iranian-born, Sweden-raised, I work in three languages. If a system is described on this site, it's running right now.<\u002Fp>\n\n        <div style=\"border-left:2px solid var(--accent);padding:14px 20px;margin:24px 0 32px;background:var(--accent-soft);border-radius:0 10px 10px 0\">\n          <p style=\"font-size:15px;line-height:1.6;color:var(--fg);margin:0\">DataKollekt is deliberately a one-person consultancy. <span style=\"font-weight:600\">No juniors, no handoffs — you work directly with the engineer who built everything on this site.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n\n        <!-- Timeline -->\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.1em;margin-bottom:18px\">EXPERIENCE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2021–present<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">DataKollekt AB — Founder &amp; consultant<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">Stockholm. Data platforms and AI-agent systems.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2021–present<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">Dun &amp; Bradstreet (Bisnode) — ETL developer<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">Consolidating ~400 ETL jobs from a dozen legacy technologies into one platform (Pentaho); Java, Perl, Bash, Postgres, Oracle, Elasticsearch.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2019–2021<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">XLENT — Data engineer<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">Data Vault 2.0 warehouse on Azure for Svenska kyrkan (ADF pipelines → PowerBI KPIs); SQL Server DW at Wasa Kredit with GDPR-aware modelling.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2019<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">Avaus — Data engineer<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">Customer analytics for Axfood; Python, Snowflake, Teradata, query optimization, ML.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2018–2019<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">Academic Work — Java developer<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">Real-time public-transport app (Spring Boot, Angular).<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2014–2019<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">DIW — Founder<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">E-commerce (own storefront + Amazon).<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-tl-row=\"\" style=\"display:grid;grid-template-columns:130px 1fr;gap:18px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)\">2012–2018<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px;color:var(--fg)\">Huddinge kommun — Team lead / acting unit chief<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5\">24 staff, 5 functions, drove digitalization.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Certifications & stack -->\n        <div data-grid=\"2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:32px\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.1em;margin-bottom:14px\">CERTIFICATIONS<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <span style=\"font-size:13.5px;color:var(--muted);display:flex;gap:9px\"><span style=\"color:var(--accent)\">✓<\u002Fspan>Certified SAFe 6 Agilist<\u002Fspan>\n              <span style=\"font-size:13.5px;color:var(--muted);display:flex;gap:9px\"><span style=\"color:var(--accent)\">✓<\u002Fspan>Professional Scrum Master (scrum.org)<\u002Fspan>\n              <span style=\"font-size:13.5px;color:var(--muted);display:flex;gap:9px\"><span style=\"color:var(--accent)\">✓<\u002Fspan>Cloud Analytics Master<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.1em;margin-bottom:14px\">STACK<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Python<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">TypeScript<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">SQL<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Java<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">FastAPI<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">React<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Azure<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Snowflake<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Postgres<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">Claude Agent SDK<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">MCP<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">CI/CD<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--chipbg);padding:4px 9px;border-radius:7px\">IaC<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:28px\">\n          <a href=\"#\" sc-camel-on-click=\"{{ onCvClick }}\" style=\"display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--fg);border:1px solid var(--border2);border-radius:9px;padding:11px 18px\">↓ Download CV / consultant profile <span style=\"color:var(--faint)\">(PDF)<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= CONTACT ================= -->\n<section id=\"contact\" style=\"max-width:1180px;margin:0 auto;padding:90px 32px 70px;text-align:center\">\n  <div data-reveal=\"\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted2);letter-spacing:.14em;margin-bottom:16px\">04 / CONTACT<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:600;letter-spacing:-.02em;margin:0 0 18px;max-width:16ch;margin-left:auto;margin-right:auto\">Let's talk about what you need built.<\u002Fh2>\n    <p style=\"font-size:15.5px;color:var(--muted);margin:0 auto 34px;max-width:520px;line-height:1.6\">Consulting buyers are buying the consultant. Email is the fastest way to reach me directly.<\u002Fp>\n    <a href=\"mailto:pooya@datakollekt.se\" style=\"display:inline-block;background:var(--accent);color:var(--accent-ink);padding:16px 30px;border-radius:10px;font-weight:600;font-size:15px;font-family:'JetBrains Mono',monospace\">pooya@datakollekt.se<\u002Fa>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:24px\">\n      <a href=\"https://www.linkedin.com/in/pooya-sh\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);border:1px solid var(--border2);border-radius:9px;padding:11px 18px\">LinkedIn ↗<\u002Fa>\n      <a href=\"https://github.com/pooya-sh\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);border:1px solid var(--border2);border-radius:9px;padding:11px 18px\">GitHub ↗<\u002Fa>\n      <a href=\"#\" sc-camel-on-click=\"{{ onCvClick }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);border:1px solid var(--border2);border-radius:9px;padding:11px 18px\">CV / profile ↓<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FOOTER ================= -->\n<footer style=\"border-top:1px solid var(--border);background:var(--bg2)\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:30px 32px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <span style=\"width:12px;height:12px;background:var(--accent);border-radius:3px;transform:rotate(45deg);display:inline-block\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--muted)\">DataKollekt AB · Stockholm, Sweden<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--faint)\">Omvandlar data till resultat.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2dd4e0&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;,&quot;options&quot;:[&quot;#2dd4e0&quot;,&quot;#3b82f6&quot;,&quot;#34d399&quot;,&quot;#fbbf24&quot;]},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;statusPulse&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { theme: 'dark', menuOpen: false };\n    this.rootRef = React.createRef();\n    this.pulseRef = React.createRef();\n    this._io = null;\n    this.toggleTheme = this.toggleTheme.bind(this);\n    this.onCvClick = this.onCvClick.bind(this);\n    this.toggleMenu = this.toggleMenu.bind(this);\n    this.closeMenu = this.closeMenu.bind(this);\n  }\n\n  componentDidMount(){\n    const t = this.props.defaultTheme === 'light' ? 'light' : 'dark';\n    if (t !== this.state.theme) this.setState({ theme: t });\n    this.applyAccent();\n    this.applyPulse();\n    this.setupReveals();\n  }\n\n  componentDidUpdate(){\n    this.applyAccent();\n    this.applyPulse();\n  }\n\n  applyAccent(){\n    const el = this.rootRef.current;\n    if (!el) return;\n    const a = this.props.accent;\n    if (a) {\n      el.style.setProperty('--accent', a);\n      // dark ink works for the curated bright accents; light theme overrides via CSS var cascade only for default\n      el.style.setProperty('--accent-soft', 'color-mix(in srgb, ' + a + ' 14%, transparent)');\n    } else {\n      el.style.removeProperty('--accent');\n      el.style.removeProperty('--accent-soft');\n    }\n  }\n\n  applyPulse(){\n    const p = this.pulseRef.current;\n    if (!p) return;\n    const on = this.props.statusPulse !== false;\n    p.style.animation = on ? 'dkpulse 2.4s infinite' : 'none';\n  }\n\n  setupReveals(){\n    const root = this.rootRef.current;\n    if (!root) return;\n    const els = Array.from(root.querySelectorAll('[data-reveal]'));\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce || !('IntersectionObserver' in window)) {\n      els.forEach(e => e.setAttribute('data-reveal','in'));\n      return;\n    }\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(en => {\n        if (en.isIntersecting) {\n          en.target.setAttribute('data-reveal','in');\n          this._io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(e => this._io.observe(e));\n    // safety: reveal anything already in view / above fold after a beat\n    setTimeout(() => {\n      els.forEach(e => {\n        const r = e.getBoundingClientRect();\n        if (r.top < window.innerHeight) e.setAttribute('data-reveal', 'in');\n      });\n    }, 60);\n  }\n\n  componentWillUnmount(){ if (this._io) this._io.disconnect(); }\n\n  toggleTheme(){\n    this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' }));\n  }\n\n  onCvClick(e){\n    e.preventDefault();\n    alert('CV / consultant profile — PDF to be added. Meanwhile, email pooya@datakollekt.se and I will send it right over.');\n  }\n\n  toggleMenu(){\n    this.setState(s => ({ menuOpen: !s.menuOpen }));\n  }\n\n  closeMenu(e){\n    if (e && e.target && e.target.closest && e.target.closest('a')) {\n      this.setState({ menuOpen: false });\n    }\n  }\n\n  renderVals(){\n    const theme = this.state.theme;\n    return {\n      rootRef: this.rootRef,\n      pulseRef: this.pulseRef,\n      theme,\n      themeLabel: theme === 'dark' ? 'LIGHT' : 'DARK',\n      toggleTheme: this.toggleTheme,\n      onCvClick: this.onCvClick,\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n      menuOpen: this.state.menuOpen,\n      menuOpenStr: this.state.menuOpen ? 'true' : 'false',\n      menuIcon: this.state.menuOpen ? '✕' : '☰',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
